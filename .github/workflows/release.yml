name: 发布 core

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: 安装依赖
        run: vp install --frozen-lockfile

      - name: 验证 tag 与包版本一致
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p \"require('./packages/core/package.json').version\")"
          test "$tag_version" = "$package_version" || {
            echo "tag 版本 v$tag_version 与 packages/core/package.json 的版本 $package_version 不一致"
            exit 1
          }

      - name: 类型检查
        run: vp run moriui#typecheck

      - name: 安装 Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: 测试
        run: vp run moriui#test

      - name: 构建
        run: vp run moriui#build

      - name: 创建 GitHub Release
        run: pnpm dlx changelogithub@14
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 升级 npm 以支持可信发布
        run: npm install -g npm@^11

      - name: 打包 core
        id: pack
        working-directory: packages/core
        run: |
          pnpm pack --pack-destination "$RUNNER_TEMP"
          tarball="$(find "$RUNNER_TEMP" -maxdepth 1 -name 'moriui-*.tgz' -print -quit)"
          test -n "$tarball" || { echo '未生成 npm tarball'; exit 1; }
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: 发布到 npm
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public
