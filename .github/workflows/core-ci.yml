name: Core CI

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/core-ci.yml'
      - '.github/workflows/release.yml'
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/core-ci.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  verify:
    name: 验证 core
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: 安装依赖
        run: vp install --frozen-lockfile

      - name: 安装 Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: 类型检查
        run: vp run moriui#typecheck

      - name: 测试
        run: vp run moriui#test

      - name: 构建
        run: vp run moriui#build

      - name: 验证发布包
        working-directory: packages/core
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
