shellEmulator: true

packages:
  - packages/**
  - docs
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
catalog:
  '@antzy/eslint-config': ^3.4.1
  '@internationalized/date': 3.12.2
  '@lucide/vue': ^1.24.0
  '@nuxt/a11y': 1.0.0-alpha.1
  '@nuxt/content': ^3.15.0
  '@nuxt/hints': 1.1.3
  '@nuxt/image': 2.0.0
  '@tailwindcss/vite': ^4.3.2
  '@tanstack/vue-table': ^8.21.3
  '@types/node': ^25.6.2
  '@unovis/ts': ^1.6.2
  '@unovis/vue': ^1.6.2
  '@vitejs/plugin-vue': ^6.0.6
  '@vitest/browser-playwright': 4.1.10
  '@vueuse/core': ^14.3.0
  better-sqlite3: ^12.11.1
  bumpp: ^11.1.0
  chrono-node: ^2.10.1
  date-fns: ^4.4.0
  embla-carousel: ^8.6.0
  embla-carousel-autoplay: ^8.6.0
  embla-carousel-vue: ^8.6.0
  eslint: ^10.7.0
  nuxt: ^4.5.0
  playwright: ^1.59.1
  reka-ui: ^2.10.1
  tailwind-merge: ^3.4.0
  tailwind-variants: ^3.2.2
  tailwindcss: ^4.3.2
  typescript: ^6.0.3
  unplugin-vue: ^7.2.0
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
  vitest: 4.1.10
  vitest-browser-vue: ^2.1.0
  vue: ^3.5.34
  vue-router: ^5.1.0
  vue-sonner: ^2.0.9
  vue-tsc: ^3.2.8
# 已审查但不参与文档静态构建的安装脚本，避免在 CI 中产生未批准脚本警告。
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  esbuild: true
  maplibre-gl: false
  sharp: false
  vue-demi: false
