  '@nuxt/image': 2.0.0
  '@tailwindcss/vite': ^4.3.2
  '@tanstack/vue-table': ^8.21.3
  '@types/node': ^25.6.2
  '@unovis/ts': ^1.6.2
  '@unovis/vue': ^1.6.2
  '@vitejs/plugin-vue': ^6.0.6
  '@vitest/browser-playwright': 4.1.10
  '@vueuse/core': ^14.3.0
  better-sqlite3: ^12.11.1
  bumpp: ^11.1.0
  embla-carousel: ^8.6.0
  embla-carousel-autoplay: ^8.6.0
  embla-carousel-vue: ^8.6.0
  eslint: ^10.7.0
